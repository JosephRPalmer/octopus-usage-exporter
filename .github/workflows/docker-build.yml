name: Docker Image CI
permissions:
  contents: read

on:
  push:
    tags:
      - "**"
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    environment: production
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/octopus-usage-exporter
            ghcr.io/${{ secrets.DOCKERHUB_USERNAME }}/octopus-usage-exporter
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.TAG_NAME }}

      - name: Build and push multi-platform Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/octopus-usage-exporter:${{ env.TAG_NAME }}
            ghcr.io/${{ secrets.DOCKERHUB_USERNAME }}/octopus-usage-exporter:${{ env.TAG_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push latest tag (if no dash in tag)
        if: ${{ !contains(env.TAG_NAME, '-') }}
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/octopus-usage-exporter:latest
            ghcr.io/${{ secrets.DOCKERHUB_USERNAME }}/octopus-usage-exporter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
